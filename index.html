<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>MusicMatrix Code Generator</title>
        <link rel="icon" href="./favicon.png" />
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <header>
            <div id="left">
                <p id="title">MusicMatrix Macro Pad Configuration</p>
                <div class="sub">Drag and drop the icons to assign shortcuts</div>
            </div>
            <div>
                <button id="exportCPPButton">Export .cpp</button>
                <button id="exportINOButton">Export .ino</button>
                <button id="settingsButton"><span class="emoji">🗑️</span></button>
            </div>
        </header>
        <div id="app">
            <main>
                <div class="pad-grid" id="padGrid"></div>
            </main>
            <aside>
                <p id="chipStatus"></p>
                <input type="text" id="search" placeholder="Search for an icon..." />
                <div id="menuContent"></div>
            </aside>
        </div>
        <footer>
            <img src="./TreeGuy1234.svg" />
            <p>MusicMatrix web code builder is a website used to assist with the creation of a MusicMatrix macro pad</p>
            <span>•</span>
            <a href="https://github.com/treeguy1234/MusicMatrixWeb">View on GitHub</a>
        </footer>
        <script src="./musescore_shortcuts.js"></script>
        <script src="./main.js"></script>
        <script src="./Source/main.cpp.js"></script>
        <script src="./Source/MusicMatrix.ino.js"></script>
    </body>
</html>
